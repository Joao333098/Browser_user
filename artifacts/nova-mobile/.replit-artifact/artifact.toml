kind = "web"
previewPath = "/"
title = "Nova AI"
version = "1.0.0"
id = "artifacts/nova-mobile"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 5000
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/nova-mobile run dev"

[services.env]
PORT = "5000"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/nova-mobile", "run", "build"]
publicDir = "artifacts/nova-mobile/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
