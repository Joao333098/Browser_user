kind = "web"
previewPath = "/"
title = "Nova AI Chat"
version = "1.0.0"
id = "artifacts/nova-chat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23842
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/nova-chat run dev"

[services.env]
PORT = "23842"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/nova-chat", "run", "build"]
publicDir = "artifacts/nova-chat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
